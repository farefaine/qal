# Tokenizer training config - 16K vocabulary

tokenizer:
  vocab_size: 16384
  min_frequency: 2
  model_type: "bpe"

  special_tokens:
    unk: "[UNK]"
    pad: "[PAD]"

  train_files:
    - "datasets/training/train.txt"

  tokenizer_path: "artifacts/tokenizers/tigrinya_tokenizer_16k.json"
  batch_size: 4096

